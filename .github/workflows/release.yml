name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write      # for GitHub release creation
  id-token: write      # reserved for future NuGet OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget  # protected environment — add required reviewers in GitHub
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack src/Ollama.Net/Ollama.Net.csproj -c Release --no-build -o artefacts

      - name: Verify publish inputs
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          # Print the key length only — never the key itself — to confirm the
          # secret is present and not truncated/empty in this run.
          echo "NUGET_API_KEY length: ${#NUGET_API_KEY}"
          echo "Artefacts to be pushed:"
          ls -la artefacts/

      - name: Push .nupkg to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artefacts/*.nupkg" \
            -s https://api.nuget.org/v3/index.json \
            -k "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Push .snupkg (symbols) to NuGet.org
        # Symbol-package pushes occasionally 403 independently of the main
        # package push (e.g. if the key lacks symbol-push scope). Don't let a
        # symbols failure fail the whole release after .nupkg has been pushed.
        continue-on-error: true
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artefacts/*.snupkg" \
            -s https://api.nuget.org/v3/index.json \
            -k "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artefacts/*.*nupkg
