version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test-dependencies:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "NSubstitute"
          - "coverlet.*"
          - "WireMock.Net"
          - "Microsoft.NET.Test.Sdk"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
